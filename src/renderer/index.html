<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alice Copy Trader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Alice Copy Trader</h1>
          <p>Leader account drives entries/exits. Followers copy automatically.</p>
        </div>
        <div class="topbar-actions">
          <span id="emergency-pill" class="pill">Follower copy ACTIVE</span>
          <button id="theme-toggle-btn" class="btn">Theme: System</button>
          <button id="emergency-btn" class="btn danger">Emergency Stop Followers</button>
          <button id="login-all-btn" class="btn">Login All</button>
          <button id="refresh-btn" class="btn">Refresh Dashboard</button>
        </div>
      </header>

      <main class="grid">
        <section class="card">
          <h2>Accounts</h2>
          <form id="account-form" class="form">
            <label>Name <input id="acc-name" required /></label>
            <label>User ID <input id="acc-user" required /></label>
            <label>API Key <input id="acc-key" required type="password" /></label>
            <label>Role
              <select id="acc-role">
                <option value="leader">Leader</option>
                <option value="follower">Follower</option>
              </select>
            </label>
            <label>Qty Multiplier <input id="acc-multiplier" type="number" step="0.1" value="1" /></label>
            <label>Max Order Qty <input id="acc-maxqty" type="number" min="0" value="0" /></label>
            <label>Max Daily Loss (INR) <input id="acc-maxloss" type="number" min="0" value="0" /></label>
            <label>Min Available Funds (INR) <input id="acc-minfunds" type="number" min="0" value="0" /></label>
            <label>Market Price Fallback <input id="acc-fallback" type="number" min="1" value="100" /></label>
            <label class="checkbox-row">
              <input id="acc-margin-guard" type="checkbox" />
              Enable Margin Guard
            </label>
            <button class="btn primary" type="submit">Add Account</button>
          </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>User</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Risk</th>
                  <th>Session</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="accounts-body"></tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <h2>Instrument Search</h2>
          <div class="search-row">
            <input id="search-query" placeholder="NIFTY / BANKNIFTY / strike" />
            <select id="search-exchange">
              <option value="">All Exchanges</option>
              <option value="INDICES">INDICES</option>
              <option value="NFO">NFO</option>
            </select>
            <button id="search-btn" class="btn">Search</button>
          </div>
          <div id="search-results" class="list"></div>
        </section>

        <section class="card">
          <h2>Place Leader Order</h2>
          <form id="order-form" class="form">
            <label>Exchange <input id="ord-exchange" value="NFO" required /></label>
            <label>Symbol <input id="ord-symbol" required /></label>
            <label>Side
              <select id="ord-side">
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
              </select>
            </label>
            <label>Qty <input id="ord-qty" type="number" min="1" value="1" required /></label>
            <label>Order Type
              <select id="ord-type">
                <option value="MARKET">MARKET</option>
                <option value="LIMIT">LIMIT</option>
              </select>
            </label>
            <label>Limit Price <input id="ord-price" type="number" step="0.05" value="0" /></label>
            <label>Product
              <select id="ord-product">
                <option value="INTRADAY">INTRADAY</option>
                <option value="DELIVERY">DELIVERY</option>
              </select>
            </label>
            <label>Target Spread <input id="ord-target" type="number" step="0.05" value="0" /></label>
            <label>Stoploss Spread <input id="ord-stoploss" type="number" step="0.05" value="0" /></label>
            <button class="btn primary" type="submit">Place & Copy</button>
          </form>
        </section>

        <section class="card">
          <h2>Open Leader Orders</h2>
          <div id="orders-list" class="list"></div>
        </section>

        <section class="card wide">
          <h2>Dashboard</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Account</th>
                  <th>User</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Funds</th>
                  <th>Available</th>
                  <th>P/L</th>
                  <th>Positions</th>
                </tr>
              </thead>
              <tbody id="dashboard-body"></tbody>
            </table>
          </div>
        </section>

        <section class="card wide">
          <h2>Audit Logs</h2>
          <div id="audit-list" class="list"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="./app.js"></script>
  </body>
</html>
